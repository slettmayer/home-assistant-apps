name: Build Add-on

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "mcp-proxy/DOCS.md"
      - "mcp-proxy/CHANGELOG.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "mcp-proxy/DOCS.md"
      - "mcp-proxy/CHANGELOG.md"
      - "LICENSE"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build add-on
        uses: home-assistant/builder@6cb4fd3d1338b6e22d0958a4bcb53e0965ea63b4 # v2026.02.1
        with:
          args: |
            ${{ github.event_name == 'pull_request' && '--test' || '' }} \
            --${{ matrix.arch }} \
            --target mcp-proxy \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --image mcp-proxy \
            --cosign \
            --addon
