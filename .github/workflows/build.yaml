name: Build Add-on

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "mcp-proxy/DOCS.md"
      - "mcp-proxy/CHANGELOG.md"
      - "LICENSE"
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'

  build:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build add-on
        uses: home-assistant/builder@6cb4fd3d1338b6e22d0958a4bcb53e0965ea63b4 # v2026.02.1
        with:
          args: |
            ${{ github.event_name == 'pull_request' && '--test' || '' }} \
            --${{ matrix.arch }} \
            --target mcp-proxy \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --image mcp-proxy \
            --cosign \
            --addon

  gate:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build result
        run: |
          if [[ "${{ needs.build.result }}" =~ ^(success|skipped)$ ]]; then
            echo "Build passed or was skipped (docs-only change)"
            exit 0
          else
            echo "Build failed or was cancelled"
            exit 1
          fi
